<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marian – Flowmatic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg:       #070711;
    --bg2:      #0d0d1a;
    --bg3:      #12122a;
    --purple:   #7c5cfc;
    --cyan:     #00d4ff;
    --grad:     linear-gradient(135deg, #7c5cfc, #00d4ff);
    --text:     #f0f0ff;
    --muted:    #8888aa;
    --border:   rgba(124,92,252,0.2);
    --border2:  rgba(255,255,255,0.07);
  }
 
  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
 
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 100vh;
  }
 
  /* subtle noise + glow */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
  }
 
  body::after {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,92,252,0.12) 0%, transparent 70%);
    top: -150px; left: -150px;
    pointer-events: none;
    z-index: 0;
  }
 
  #shell {
    position: relative; z-index: 1;
    width: 100%;
    max-width: 520px;
    height: min(700px, 90vh);
    background: var(--bg2);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 0 60px rgba(124,92,252,0.15), 0 2px 40px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
 
  /* Header */
  #hdr {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(13,13,26,0.9);
    backdrop-filter: blur(10px);
  }
 
  #hdr-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 14px; font-weight: 700; color: #fff;
    box-shadow: 0 0 14px rgba(124,92,252,0.5);
  }
 
  #hdr-info { flex: 1; }
  #hdr-name { font-size: 14px; font-weight: 600; color: var(--text); }
  #hdr-role { font-size: 11px; color: var(--muted); margin-top: 2px; }
  #hdr-status { font-size: 11px; color: var(--cyan); display: flex; align-items: center; gap: 5px; margin-top: 3px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
 
  #hdr-badge {
    font-size: 10px; font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(124,92,252,0.15);
    border: 1px solid rgba(124,92,252,0.3);
    color: var(--purple);
    letter-spacing: 0.03em;
  }
 
  /* Messages */
  #msgs {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
 
  #msgs::-webkit-scrollbar { width: 4px; }
  #msgs::-webkit-scrollbar-track { background: transparent; }
  #msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
 
  .row { display: flex; gap: 8px; align-items: flex-end; animation: up 0.22s ease; }
  .row.user { flex-direction: row-reverse; }
 
  @keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
 
  .av {
    width: 26px; height: 26px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600;
    margin-bottom: 2px;
  }
  .av.ai {
    background: var(--grad);
    color: #fff;
    box-shadow: 0 0 8px rgba(124,92,252,0.4);
    font-size: 11px;
  }
  .av.user { background: rgba(255,255,255,0.08); color: var(--muted); border: 1px solid var(--border2); }
 
  .bbl {
    max-width: 78%;
    padding: 11px 15px;
    font-size: 14px;
    line-height: 1.65;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
  }
  .row.user .bbl { border-bottom-left-radius: 16px; border-bottom-right-radius: 4px; }
 
  .bbl.ai {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border2);
  }
  .bbl.user {
    background: rgba(124,92,252,0.18);
    color: var(--text);
    border: 1px solid rgba(124,92,252,0.3);
  }
 
  /* Typing */
  .dots { display: flex; gap: 4px; align-items: center; height: 18px; }
  .dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--muted);
    animation: bop 1.1s ease-in-out infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.16s; }
  .dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bop { 0%,80%,100%{transform:scale(0.6);opacity:0.3;} 40%{transform:scale(1);opacity:1;} }
 
  /* Summary panel */
  #summary {
    border-top: 1px solid var(--border2);
    padding: 16px 20px;
    display: none;
    flex-direction: column;
    gap: 12px;
    background: rgba(7,7,17,0.6);
  }
  #summary.show { display: flex; }
 
  #sum-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
  }
 
  #sum-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
 
  .sc {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 13px;
  }
  .sc.wide { grid-column: 1/-1; }
  .sc-l { font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .sc-v { font-size: 13px; color: var(--text); line-height: 1.5; }
  .sc-v.bold { font-weight: 600; }
 
  #submit-btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--grad);
    color: white;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
    box-shadow: 0 0 20px rgba(124,92,252,0.3);
  }
  #submit-btn:hover { opacity: 0.9; }
  #submit-btn:active { transform: scale(0.99); }
  #submit-btn:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }
 
  #done-msg {
    text-align: center;
    font-size: 13px;
    color: var(--cyan);
    padding: 4px 0;
    display: none;
  }
 
  /* Input */
  #input-row {
    padding: 12px 16px;
    border-top: 1px solid var(--border2);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: rgba(13,13,26,0.9);
  }
 
  #inp {
    flex: 1;
    min-height: 40px;
    max-height: 100px;
    padding: 10px 15px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    border: 1px solid var(--border);
    border-radius: 20px;
    resize: none;
    background: var(--bg3);
    color: var(--text);
    line-height: 1.45;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #inp:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,92,252,0.15); }
  #inp:disabled { opacity: 0.35; cursor: default; }
  #inp::placeholder { color: var(--muted); }
 
  #sbtn {
    width: 38px; height: 38px;
    border-radius: 50%; border: none;
    background: var(--grad);
    color: white;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 0 12px rgba(124,92,252,0.4);
  }
  #sbtn:hover { opacity: 0.9; }
  #sbtn:active { transform: scale(0.92); }
  #sbtn:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }
 
  @media (max-width: 480px) {
    body { padding: 0; align-items: flex-end; }
    #shell { max-width: 100%; height: 100vh; border-radius: 0; }
  }
</style>
</head>
<body>
 
<div id="shell">
  <div id="hdr">
    <div id="hdr-avatar">M</div>
    <div id="hdr-info">
      <div id="hdr-name">Marian</div>
      <div id="hdr-role">Specjalista ds. automatyzacji · Flowmatic</div>
      <div id="hdr-status"><span class="dot"></span>Online teraz</div>
    </div>
    <div id="hdr-badge">Flowmatic</div>
  </div>
 
  <div id="msgs"></div>
 
  <div id="summary">
    <div id="sum-label">Podsumowanie zgłoszenia</div>
    <div id="sum-grid"></div>
    <button id="submit-btn" onclick="submitForm()">Wyślij zgłoszenie do Seweryna →</button>
    <div id="done-msg">✅ Zgłoszenie wysłane! Seweryn odezwie się wkrótce.</div>
  </div>
 
  <div id="input-row">
    <textarea id="inp" placeholder="Napisz wiadomość..." rows="1"></textarea>
    <button id="sbtn" onclick="send()">↑</button>
  </div>
</div>
 
<script>
// ============================================================
// ▼ WKLEJ TUTAJ SWÓJ ENDPOINT Z FORMSPREE ▼
const FORMSPREE_ENDPOINT = 'https://formspree.io/f/myknbkjz';
// ============================================================
 
const SYSTEM = `Jesteś Marian — doświadczony specjalista ds. obsługi klienta i automatyzacji procesów w firmie Flowmatic. Rozmawiasz z potencjalnym klientem, który odwiedził stronę Flowmatic.pl.
 
Flowmatic to firma, która automatyzuje procesy biznesowe: workflow, maile, faktury, chatboty, integracje systemów. Klientami są rozwijające się firmy, które chcą oszczędzić czas i wyeliminować powtarzalną pracę.
 
TWÓJ CEL:
Przeprowadź naturalną, przyjazną rozmowę, w której:
1. Zbierzesz dane kontaktowe klienta (imię, firma, email LUB telefon — przynajmniej jedno)
2. Dogłębnie zrozumiesz ich sytuację biznesową i problemy
3. Zidentyfikujesz gdzie tracą czas i co można zautomatyzować
 
INFORMACJE DO ZEBRANIA (w tej kolejności, naturalnie):
- Imię (lub imię i nazwisko)
- Nazwa firmy
- Co firma robi / czym się zajmuje
- Jakie procesy zajmują im najwięcej czasu lub są najbardziej uciążliwe
- Ile osób w firmie / skala działalności
- Czy używają już jakichś narzędzi (arkusze, CRM, programy do faktur itp.)
- Dane kontaktowe: email LUB telefon (co najmniej jedno z nich)
 
STYL ROZMOWY:
- Jesteś ciepły, profesjonalny, konkretny — nie korporacyjny
- Pytaj o jedno, maksymalnie dwie sprawy naraz — nie zasypuj pytaniami
- Słuchaj aktywnie — nawiązuj do tego co mówi klient
- Kiedy klient opisuje problem, wykaż zrozumienie i zainteresowanie
- Możesz krótko wspomnieć że Flowmatic rozwiązuje podobne problemy — ale nie sprzedawaj agresywnie
- Jeśli klient jest niezdecydowany lub nie wie od czego zacząć — pomóż mu to nazwać
- Bądź zwięzły — wiadomości max 2-3 zdania, chyba że sytuacja wymaga więcej
 
ZAKOŃCZENIE ROZMOWY:
Gdy masz: imię, firmę, opis problemu/procesu ORAZ przynajmniej email lub telefon — możesz zakończyć.
Napisz naturalną wiadomość pożegnalną (że Seweryn z Flowmatic odezwie się wkrótce z propozycją), a następnie DOKŁADNIE na końcu dodaj blok danych:
 
##DANE##
imie: [imię lub imię i nazwisko]
firma: [nazwa firmy]
branza: [czym się zajmuje firma]
problem: [główny problem/proces do automatyzacji — zwięźle ale konkretnie]
narzedzia: [narzędzia które używają, lub "brak danych"]
email: [email lub "brak"]
telefon: [telefon lub "brak"]
##KONIEC##
 
WAŻNE:
- Klient nigdy nie widzi bloku ##DANE##
- Pisz wyłącznie po polsku
- Jeśli klient poda tylko email albo tylko telefon — to wystarczy, nie wymagaj obu
- Nie wspominaj o bloku danych ani o procesie zbierania informacji`;
 
const msgsEl = document.getElementById('msgs');
const inpEl = document.getElementById('inp');
const sbtn = document.getElementById('sbtn');
const summaryEl = document.getElementById('summary');
const sumGrid = document.getElementById('sum-grid');
 
let history = [];
let busy = false;
let collected = null;
 
function parseData(text) {
  const m = text.match(/##DANE##([\s\S]*?)##KONIEC##/);
  if (!m) return null;
  const b = m[1];
  const get = k => { const r = b.match(new RegExp(k + ':\\s*(.+)')); return r ? r[1].trim() : ''; };
  const d = {
    imie: get('imie'),
    firma: get('firma'),
    branza: get('branza'),
    problem: get('problem'),
    narzedzia: get('narzedzia'),
    email: get('email'),
    telefon: get('telefon')
  };
  const hasContact = (d.email && d.email !== 'brak') || (d.telefon && d.telefon !== 'brak');
  return (d.imie && d.firma && d.problem && hasContact) ? d : null;
}
 
function clean(text) {
  return text.replace(/##DANE##[\s\S]*?##KONIEC##/g, '').trim();
}
 
function addMsg(role, html) {
  const row = document.createElement('div');
  row.className = `row ${role}`;
  const label = role === 'ai' ? 'M' : 'Ty';
  row.innerHTML = `
    <div class="av ${role}">${label}</div>
    <div class="bbl ${role}">${html}</div>
  `;
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
 
function addTyping() {
  const row = document.createElement('div');
  row.className = 'row ai'; row.id = 'typing';
  row.innerHTML = `<div class="av ai">M</div><div class="bbl ai"><div class="dots"><span></span><span></span><span></span></div></div>`;
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
 
function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}
 
function showSummary(data) {
  collected = data;
  const contactVal = [
    data.email && data.email !== 'brak' ? data.email : null,
    data.telefon && data.telefon !== 'brak' ? data.telefon : null
  ].filter(Boolean).join(' · ') || '—';
 
  sumGrid.innerHTML = `
    <div class="sc">
      <div class="sc-l">Imię i nazwisko</div>
      <div class="sc-v bold">${data.imie}</div>
    </div>
    <div class="sc">
      <div class="sc-l">Firma</div>
      <div class="sc-v bold">${data.firma}</div>
    </div>
    <div class="sc wide">
      <div class="sc-l">Kontakt</div>
      <div class="sc-v">${contactVal}</div>
    </div>
    <div class="sc wide">
      <div class="sc-l">Problem / proces do automatyzacji</div>
      <div class="sc-v">${data.problem}</div>
    </div>
    ${data.narzedzia && data.narzedzia !== 'brak danych' ? `
    <div class="sc wide">
      <div class="sc-l">Używane narzędzia</div>
      <div class="sc-v">${data.narzedzia}</div>
    </div>` : ''}
  `;
  summaryEl.classList.add('show');
  inpEl.disabled = true;
  sbtn.disabled = true;
}
 
async function submitForm() {
  if (!collected) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Wysyłanie...';
 
  try {
    const res = await fetch(FORMSPREE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        imie_nazwisko: collected.imie,
        firma: collected.firma,
        branza: collected.branza,
        problem: collected.problem,
        narzedzia: collected.narzedzia,
        email: collected.email,
        telefon: collected.telefon
      })
    });
    if (res.ok) {
      btn.style.display = 'none';
      document.getElementById('done-msg').style.display = 'block';
    } else {
      btn.textContent = 'Błąd — spróbuj ponownie';
      btn.disabled = false;
    }
  } catch(e) {
    btn.textContent = 'Błąd — spróbuj ponownie';
    btn.disabled = false;
  }
}
 
async function callClaude(msg) {
  history.push({ role: 'user', content: msg });
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM,
      messages: history
    })
  });
  const data = await res.json();
  const full = data.content.map(b => b.text || '').join('');
  history.push({ role: 'assistant', content: full });
  return full;
}
 
async function send() {
  const txt = inpEl.value.trim();
  if (!txt || busy) return;
  busy = true; sbtn.disabled = true;
  inpEl.value = ''; inpEl.style.height = 'auto';
  addMsg('user', txt);
  addTyping();
  try {
    const reply = await callClaude(txt);
    removeTyping();
    const data = parseData(reply);
    const text = clean(reply);
    if (text) addMsg('ai', text.replace(/\n/g, '<br>'));
    if (data) showSummary(data);
  } catch(e) {
    removeTyping();
    addMsg('ai', 'Przepraszam, coś poszło nie tak. Odśwież stronę i spróbuj ponownie.');
  }
  busy = false;
  if (!inpEl.disabled) sbtn.disabled = false;
  inpEl.focus();
}
 
inpEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inpEl.addEventListener('input', () => {
  inpEl.style.height = 'auto';
  inpEl.style.height = Math.min(inpEl.scrollHeight, 100) + 'px';
});
 
async function init() {
  busy = true; sbtn.disabled = true;
  addTyping();
  try {
    const reply = await callClaude('start');
    removeTyping();
    const text = clean(reply);
    if (text) addMsg('ai', text.replace(/\n/g, '<br>'));
  } catch(e) {
    removeTyping();
    addMsg('ai', 'Cześć! Jestem Marian z Flowmatic. Zanim zaczniemy — jak mam się do Ciebie zwracać?');
  }
  busy = false; sbtn.disabled = false;
  inpEl.focus();
}
 
init();
</script>
</body>
</html>
