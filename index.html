<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asystent onboardingu</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #9FE1CB;
    --green-text: #085041;
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --text-muted: #6b6b66;
    --text-faint: #9a9a94;
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }
  body { display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 100vh; }

  #shell { width: 100%; max-width: 520px; height: min(700px, 90vh); background: var(--surface); border-radius: 20px; border: 0.5px solid var(--border-strong); box-shadow: 0 2px 40px rgba(0,0,0,0.07); display: flex; flex-direction: column; overflow: hidden; }

  #hdr { padding: 16px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 11px; background: var(--surface); }
  #hdr-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #hdr-avatar svg { width: 16px; height: 16px; }
  #hdr-info { flex: 1; }
  #hdr-name { font-size: 14px; font-weight: 500; color: var(--text); }
  #hdr-status { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; margin-top: 1px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

  #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  #msgs::-webkit-scrollbar { width: 4px; }
  #msgs::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  .row { display: flex; gap: 8px; align-items: flex-end; animation: up 0.22s ease; }
  .row.user { flex-direction: row-reverse; }
  @keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .av { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; margin-bottom: 2px; }
  .av.ai { background: var(--green-light); color: var(--green-dark); }
  .av.user { background: #EEF2FF; color: #4338ca; }

  .bbl { max-width: 78%; padding: 10px 14px; font-size: 14px; line-height: 1.65; border-radius: 16px; border-bottom-left-radius: 4px; }
  .row.user .bbl { border-bottom-left-radius: 16px; border-bottom-right-radius: 4px; }
  .bbl.ai { background: var(--bg); color: var(--text); border: 0.5px solid var(--border); }
  .bbl.user { background: var(--green-light); color: var(--green-text); border: 0.5px solid var(--green-mid); }

  .dots { display: flex; gap: 4px; align-items: center; height: 18px; }
  .dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-faint); animation: bop 1.1s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: 0.16s; }
  .dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bop { 0%,80%,100%{transform:scale(0.6);opacity:0.3;} 40%{transform:scale(1);opacity:1;} }

  #summary { border-top: 0.5px solid var(--border); padding: 16px 20px; display: none; flex-direction: column; gap: 12px; background: #FAFAF8; }
  #summary.show { display: flex; }
  #sum-label { font-size: 10px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-faint); }
  #sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sc { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; }
  .sc.wide { grid-column: 1/-1; }
  .sc-l { font-size: 11px; color: var(--text-faint); margin-bottom: 3px; }
  .sc-v { font-size: 13px; color: var(--text); font-weight: 400; line-height: 1.45; }
  .sc-v.bold { font-weight: 500; }

  #submit-btn { padding: 11px; border-radius: var(--radius-sm); border: none; background: var(--green); color: white; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  #submit-btn:hover { background: var(--green-dark); }
  #submit-btn:disabled { background: var(--border-strong); cursor: default; }
  #done-msg { text-align: center; font-size: 13px; color: var(--green-dark); padding: 4px 0; display: none; }

  #input-row { padding: 12px 16px; border-top: 0.5px solid var(--border); display: flex; gap: 8px; align-items: flex-end; background: var(--surface); }
  #inp { flex: 1; min-height: 40px; max-height: 100px; padding: 10px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; border: 0.5px solid var(--border-strong); border-radius: 20px; resize: none; background: var(--bg); color: var(--text); line-height: 1.45; outline: none; transition: border-color 0.15s; }
  #inp:focus { border-color: var(--green); background: var(--surface); }
  #inp:disabled { opacity: 0.45; cursor: default; }
  #inp::placeholder { color: var(--text-faint); }
  #sbtn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--green); color: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  #sbtn:hover { background: var(--green-dark); }
  #sbtn:disabled { background: var(--border-strong); cursor: default; }

  @media (max-width: 480px) {
    body { padding: 0; align-items: flex-end; }
    #shell { max-width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
  }
</style>
</head>
<body>
<div id="shell">
  <div id="hdr">
    <div id="hdr-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div id="hdr-info">
      <div id="hdr-name">Asystent onboardingu</div>
      <div id="hdr-status"><span class="dot"></span>Odpowiada zwykle w kilka sekund</div>
    </div>
  </div>
  <div id="msgs"></div>
  <div id="summary">
    <div id="sum-label">Podsumowanie zgłoszenia</div>
    <div id="sum-grid"></div>
    <button id="submit-btn" onclick="submitForm()">Wyślij zgłoszenie →</button>
    <div id="done-msg">Zgłoszenie wysłane. Odezwiemy się wkrótce!</div>
  </div>
  <div id="input-row">
    <textarea id="inp" placeholder="Napisz wiadomość..." rows="1"></textarea>
    <button id="sbtn" onclick="send()">↑</button>
  </div>
</div>

<script>
const FORMSPREE_ENDPOINT = 'https://formspree.io/f/myknbkjz';

const SYSTEM = `Jesteś uprzejmym asystentem onboardingu dla firmy zajmującej się automatyzacją procesów biznesowych. Rozmawiasz z potencjalnym klientem.

Twoim celem jest zebrać szczegółowe informacje o kliencie i jego procesach. Zbierasz:
1. Imię i nazwisko
2. Nazwa firmy i branża
3. Dokładny opis procesu obsługi klienta krok po kroku
4. Jak trafiają do nich zlecenia (telefon, mail, formularz, osobiście?)
5. Jakie narzędzia już używają (Excel, arkusze Google, programy do faktur, CRM?)
6. Ile osób obsługuje ten proces?
7. Co sprawia największy problem lub zajmuje najwięcej czasu?

Zasady rozmowy:
- Zacznij od krótkiego, przyjaznego powitania i zapytaj o imię i nazwisko
- Zbieraj informacje naturalnie i po kolei — nigdy nie zadawaj więcej niż jednego pytania naraz
- Gdy klient opisze proces ogólnie, dopytaj o szczegóły — np. "Co dzieje się potem?", "Kto to robi?", "Jak długo to trwa?"
- Drąż temat aż uzyskasz konkretny, kompletny obraz procesu od A do Z
- Dopiero gdy masz odpowiedzi na wszystkie 7 punktów — zakończ rozmowę
- Jeśli klient odpowiada zdawkowo, zachęć go do rozwinięcia

Gdy masz komplet danych, napisz naturalną wiadomość pożegnalną, a następnie DOKŁADNIE na końcu wiadomości dodaj ten blok:

##DANE##
imie: [imię i nazwisko]
firma: [nazwa firmy i branża]
proces: [szczegółowy opis procesu krok po kroku]
zrodlo_zlecen: [jak trafiają zlecenia]
narzedzia: [jakie narzędzia używają]
zespol: [ile osób]
problemy: [największe bolączki]
##KONIEC##

Ważne:
- Klient nigdy nie powinien zobaczyć tego bloku danych
- Nie wspominaj o automatyzacji, zadaniach ani narzędziach technicznych
- Bądź ciepły, profesjonalny, zwięzły — krótkie pytania, nie długie wywody
- Pisz wyłącznie po polsku`;

const msgsEl = document.getElementById('msgs');
const inpEl = document.getElementById('inp');
const sbtn = document.getElementById('sbtn');
const summaryEl = document.getElementById('summary');
const sumGrid = document.getElementById('sum-grid');

let history = [], busy = false, collected = null;

function parseData(text) {
  const m = text.match(/##DANE##([\s\S]*?)##KONIEC##/);
  if (!m) return null;
  const b = m[1];
  const get = k => { const r = b.match(new RegExp(k+':\\s*(.+)')); return r ? r[1].trim() : ''; };
  const d = { imie: get('imie'), firma: get('firma'), proces: get('proces'), zrodlo: get('zrodlo_zlecen'), narzedzia: get('narzedzia'), zespol: get('zespol'), problemy: get('problemy') };
  return (d.imie && d.firma && d.proces) ? d : null;
}

function clean(text) { return text.replace(/##DANE##[\s\S]*?##KONIEC##/g, '').trim(); }

function addMsg(role, html) {
  const row = document.createElement('div');
  row.className = `row ${role}`;
  row.innerHTML = `<div class="av ${role}">${role === 'ai' ? 'AI' : 'Ty'}</div><div class="bbl ${role}">${html}</div>`;
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'row ai'; row.id = 'typing';
  row.innerHTML = `<div class="av ai">AI</div><div class="bbl ai"><div class="dots"><span></span><span></span><span></span></div></div>`;
  msgsEl.appendChild(row);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function showSummary(data) {
  collected = data;
  sumGrid.innerHTML = `
    <div class="sc"><div class="sc-l">Imię i nazwisko</div><div class="sc-v bold">${data.imie}</div></div>
    <div class="sc"><div class="sc-l">Firma i branża</div><div class="sc-v bold">${data.firma}</div></div>
    <div class="sc wide"><div class="sc-l">Opis procesu</div><div class="sc-v">${data.proces}</div></div>
    <div class="sc"><div class="sc-l">Źródło zleceń</div><div class="sc-v">${data.zrodlo || '—'}</div></div>
    <div class="sc"><div class="sc-l">Narzędzia</div><div class="sc-v">${data.narzedzia || '—'}</div></div>
    <div class="sc"><div class="sc-l">Zespół</div><div class="sc-v">${data.zespol || '—'}</div></div>
    <div class="sc"><div class="sc-l">Największy problem</div><div class="sc-v">${data.problemy || '—'}</div></div>
  `;
  summaryEl.classList.add('show');
  inpEl.disabled = true;
  sbtn.disabled = true;
}

async function submitForm() {
  if (!collected) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Wysyłanie...';
  try {
    const res = await fetch(FORMSPREE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ imie_nazwisko: collected.imie, firma: collected.firma, opis_procesu: collected.proces, zrodlo_zlecen: collected.zrodlo || '', narzedzia: collected.narzedzia || '', zespol: collected.zespol || '', problemy: collected.problemy || '' })
    });
    if (res.ok) { btn.style.display = 'none'; document.getElementById('done-msg').style.display = 'block'; }
    else { btn.textContent = 'Błąd — spróbuj ponownie'; btn.disabled = false; }
  } catch(e) { btn.textContent = 'Błąd — spróbuj ponownie'; btn.disabled = false; }
}

async function callClaude(msg) {
  history.push({ role: 'user', content: msg });
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM, messages: history })
  });
  const data = await res.json();
  const full = data.content.map(b => b.text || '').join('');
  history.push({ role: 'assistant', content: full });
  return full;
}

async function send() {
  const txt = inpEl.value.trim();
  if (!txt || busy) return;
  busy = true; sbtn.disabled = true;
  inpEl.value = ''; inpEl.style.height = 'auto';
  addMsg('user', txt); addTyping();
  try {
    const reply = await callClaude(txt);
    removeTyping();
    const data = parseData(reply);
    const text = clean(reply);
    if (text) addMsg('ai', text.replace(/\n/g, '<br>'));
    if (data) showSummary(data);
  } catch(e) {
    removeTyping();
    addMsg('ai', 'Przepraszam, wystąpił problem. Odśwież stronę i spróbuj ponownie.');
  }
  busy = false;
  if (!inpEl.disabled) sbtn.disabled = false;
  inpEl.focus();
}

inpEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
inpEl.addEventListener('input', () => { inpEl.style.height = 'auto'; inpEl.style.height = Math.min(inpEl.scrollHeight, 100) + 'px'; });

async function init() {
  busy = true; sbtn.disabled = true; addTyping();
  try {
    const reply = await callClaude('start');
    removeTyping();
    const text = clean(reply);
    if (text) addMsg('ai', text.replace(/\n/g, '<br>'));
  } catch(e) {
    removeTyping();
    addMsg('ai', 'Cześć! Zanim zaczniemy — jak mam się do Ciebie zwracać?');
  }
  busy = false; sbtn.disabled = false; inpEl.focus();
}

init();
</script>
</body>
</html>
